name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  train:
    name: Continuous Integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Run Training Script
        run: python scripts/train.py
        
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: model-artifacts
          path: |
            model.pkl
            metrics.json

  deploy:
    name: Continuous Deployment
    needs: train
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          name: model-artifacts

      - name: Compare Metrics
        id: compare
        run: |
          CURRENT_R2=$(jq -r '.r2' metrics.json) 
          BEST_R2=${{ vars.BEST_R2 }}
          
          if (( $(echo "$CURRENT_R2 > $BEST_R2" | bc -l) )); then
            echo "IMPROVED=true" >> $GITHUB_ENV
            echo "CURRENT_R2=$CURRENT_R2" >> $GITHUB_ENV
          else
            echo "2022bcs0068:----Metric did not improve"
            echo "IMPROVED=false" >> $GITHUB_ENV
          fi

      - name: Log in to Docker Hub
        if: env.IMPROVED == 'true'
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and Publish Image
        if: env.IMPROVED == 'true'
        run: |
          docker build -t iiitkabel/wine-model:latest . 
          docker push iiitkabel/wine-model:latest 

      - name: Update Baseline Metric
        if: env.IMPROVED == 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          gh api \
            --method PATCH \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            /repos/${{ github.repository }}/actions/variables/BEST_R2 \
            -f name='BEST_R2' -f value="$CURRENT_R2"
